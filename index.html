<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인공지능과기계학습 — 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --accent: #58a6ff;
  --accent2: #bc8cff;
  --green: #3fb950;
  --red: #f85149;
  --yellow: #d29922;
  --text: #e6edf3;
  --text2: #8b949e;
  --code-bg: #0d1117;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  line-height: 1.75;
  min-height: 100vh;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; min-height: 100vh; }

/* ── START ── */
#start-screen {
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  background: radial-gradient(ellipse at 50% 0%, rgba(88,166,255,0.08) 0%, transparent 60%);
}
.logo { font-size: 48px; margin-bottom: 20px; }
.start-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }
.start-title span { color: var(--accent); }
.start-sub { font-size: 14px; color: var(--text2); margin-bottom: 36px; }
.mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; max-width: 700px; width: 100%; margin-bottom: 30px; }
.mode-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.mode-card:hover { border-color: var(--accent); background: var(--bg3); transform: translateY(-2px); }
.mode-card.selected { border-color: var(--accent); background: rgba(88,166,255,0.1); }
.mode-card .mc-icon { font-size: 28px; margin-bottom: 8px; }
.mode-card .mc-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.mode-card .mc-desc { font-size: 12px; color: var(--text2); }
.start-btn {
  background: var(--accent);
  color: #0d1117;
  border: none;
  padding: 14px 48px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.start-btn:hover { background: #79c0ff; transform: translateY(-1px); }
.stats-preview { display: flex; gap: 24px; margin-top: 24px; }
.stat-pill { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: var(--text2); }
.stat-pill strong { color: var(--text); }

/* ── QUIZ ── */
#quiz-screen { padding: 0; }
.quiz-topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.quiz-topbar .qnum { font-size: 13px; color: var(--text2); white-space: nowrap; }
.progress-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s ease; }
.score-live { font-size: 13px; font-weight: 700; color: var(--green); white-space: nowrap; }
.exit-btn { background: none; border: 1px solid var(--border); color: var(--text2); padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
.exit-btn:hover { border-color: var(--red); color: var(--red); }

.quiz-body { flex: 1; padding: 32px 24px; max-width: 800px; margin: 0 auto; width: 100%; }

.q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
.q-badge { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 4px; }
.q-badge.obj { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }
.q-badge.sub { background: rgba(63,185,80,0.12); color: var(--green); border: 1px solid rgba(63,185,80,0.3); }
.q-badge.code { background: rgba(188,140,255,0.12); color: var(--accent2); border: 1px solid rgba(188,140,255,0.3); }
.q-badge.key { background: rgba(248,81,73,0.12); color: var(--red); border: 1px solid rgba(248,81,73,0.3); }
.q-num-badge { font-size: 13px; color: var(--text2); }

.q-text {
  font-size: 16px;
  font-weight: 500;
  line-height: 1.8;
  margin-bottom: 20px;
  color: var(--text);
}
.q-text strong { color: #f0c060; }
.q-text code {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--accent2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  padding: 1px 6px;
  border-radius: 4px;
}

.code-block {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px 18px;
  margin: 14px 0;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  color: #abb2bf;
}
.code-block .kw { color: #c678dd; }
.code-block .fn { color: #61afef; }
.code-block .cls { color: #e5c07b; }
.code-block .str { color: #98c379; }
.code-block .cm { color: #5c6370; font-style: italic; }
.code-block .num { color: #d19a66; }
.code-block .blank {
  display: inline-block;
  background: #f38ba8;
  color: #1e1e2e;
  font-weight: 700;
  padding: 0 8px;
  border-radius: 3px;
  min-width: 60px;
  text-align: center;
}

/* 선택지 */
.choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.choice-btn {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.15s;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
}
.choice-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(88,166,255,0.06); }
.choice-btn .ch-label {
  font-weight: 800;
  color: var(--accent);
  min-width: 22px;
  flex-shrink: 0;
  font-size: 13px;
}
.choice-btn.correct { border-color: var(--green); background: rgba(63,185,80,0.1); }
.choice-btn.correct .ch-label { color: var(--green); }
.choice-btn.wrong { border-color: var(--red); background: rgba(248,81,73,0.08); }
.choice-btn.wrong .ch-label { color: var(--red); }
.choice-btn.dimmed { opacity: 0.4; }
.choice-btn:disabled { cursor: default; }
.choice-btn code {
  background: var(--bg3);
  color: var(--accent2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 1px 5px;
  border-radius: 3px;
}

/* 입력형 */
.input-area { margin-bottom: 20px; }
.input-area textarea, .input-area input {
  width: 100%;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.6;
  resize: vertical;
  transition: border-color 0.15s;
  min-height: 60px;
}
.input-area textarea:focus, .input-area input:focus {
  outline: none;
  border-color: var(--accent);
}
.input-area .input-hint { font-size: 12px; color: var(--text2); margin-top: 6px; }

/* 피드백 박스 */
.feedback-box {
  display: none;
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 20px;
  animation: fadeIn 0.3s ease;
}
.feedback-box.show { display: block; }
.feedback-box.correct { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); }
.feedback-box.wrong { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.3); }
.feedback-box.info { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.25); }
.feedback-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.feedback-box.correct .feedback-title { color: var(--green); }
.feedback-box.wrong .feedback-title { color: var(--red); }
.feedback-box.info .feedback-title { color: var(--accent); }
.feedback-ans { font-size: 14px; color: var(--text); line-height: 1.7; margin-bottom: 8px; }
.feedback-ans strong { color: #f0c060; }
.feedback-ans code { background: var(--bg3); color: var(--accent2); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 1px 5px; border-radius: 3px; }
.feedback-exp { font-size: 13px; color: var(--text2); line-height: 1.7; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }
.feedback-exp strong { color: var(--text); }
.feedback-exp code { background: var(--bg3); color: var(--accent2); font-family: 'JetBrains Mono', monospace; font-size: 12px; padding: 1px 5px; border-radius: 3px; }

/* 버튼 */
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
.btn-check, .btn-next, .btn-skip {
  padding: 11px 28px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
}
.btn-check { background: var(--accent); color: #0d1117; }
.btn-check:hover { background: #79c0ff; }
.btn-check:disabled { opacity: 0.4; cursor: default; }
.btn-next { background: var(--green); color: #0d1117; }
.btn-next:hover { background: #56d364; }
.btn-skip { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-skip:hover { border-color: var(--yellow); color: var(--yellow); }

/* ── RESULT ── */
#result-screen {
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  background: radial-gradient(ellipse at 50% 0%, rgba(63,185,80,0.08) 0%, transparent 60%);
}
.result-emoji { font-size: 64px; margin-bottom: 16px; animation: bounce 0.6s ease; }
.result-title { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
.result-score-big { font-size: 64px; font-weight: 900; color: var(--accent); line-height: 1; margin: 16px 0; }
.result-score-big span { font-size: 28px; color: var(--text2); }
.result-sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; }
.result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 500px; width: 100%; margin-bottom: 32px; }
.result-stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.result-stat .rs-val { font-size: 28px; font-weight: 900; }
.result-stat .rs-val.g { color: var(--green); }
.result-stat .rs-val.r { color: var(--red); }
.result-stat .rs-val.y { color: var(--yellow); }
.result-stat .rs-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
.result-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.result-btns button {
  padding: 12px 28px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.2s;
  border: none;
}
.btn-retry { background: var(--accent); color: #0d1117; }
.btn-retry:hover { background: #79c0ff; }
.btn-wrong-only { background: var(--red); color: #fff; }
.btn-wrong-only:hover { background: #ff6b6b; }
.btn-home { background: var(--bg3); color: var(--text); border: 1px solid var(--border) !important; }
.btn-home:hover { border-color: var(--accent) !important; color: var(--accent); }

/* 범주별 성적 */
.category-result { max-width: 500px; width: 100%; margin-bottom: 28px; text-align: left; }
.cat-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.cat-label { font-size: 13px; color: var(--text2); min-width: 70px; }
.cat-bar-wrap { flex: 1; height: 8px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.cat-bar { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
.cat-pct { font-size: 13px; font-weight: 700; min-width: 36px; text-align: right; }

@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
@keyframes bounce { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-12px); } }

/* 모바일 */
@media(max-width:600px) {
  .quiz-body { padding: 20px 16px; }
  .result-grid { grid-template-columns: repeat(2,1fr); }
  .mode-grid { grid-template-columns: 1fr; }
}

/* 형광펜 효과 */
.hl { background: rgba(240,192,96,0.2); border-radius: 2px; padding: 0 2px; }
</style>
</head>
<body>

<!-- ══ START ══ -->
<div id="start-screen" class="screen active">
  <div class="start-title">인공지능과 기계학습</div>
  <div class="start-sub">Week 2~7</div>

  <div class="mode-grid">
    <div class="mode-card selected" onclick="selectMode('all', this)">
      <div class="mc-icon">📚</div>
      <div class="mc-title">전체 문제</div>
      <div class="mc-desc">110문제 전부</div>
    </div>
    <div class="mode-card" onclick="selectMode('obj', this)">
      <div class="mc-icon">☑️</div>
      <div class="mc-title">객관식</div>
      <div class="mc-desc">객관식 28문제</div>
    </div>
    <div class="mode-card" onclick="selectMode('sub', this)">
      <div class="mc-icon">✏️</div>
      <div class="mc-title">단답형</div>
      <div class="mc-desc">단답형 44문제</div>
    </div>
    <div class="mode-card" onclick="selectMode('code', this)">
      <div class="mc-icon">💻</div>
      <div class="mc-title">코드 문제</div>
      <div class="mc-desc">코드 38문제</div>
    </div>
    <div class="mode-card" onclick="selectMode('random20', this)">
      <div class="mc-icon">🎲</div>
      <div class="mc-title">랜덤 20문제</div>
    </div>
  </div>

  <button class="start-btn" onclick="startQuiz()">시작하기</button>
</div>

<!-- ══ QUIZ ══ -->
<div id="quiz-screen" class="screen">
  <div class="quiz-topbar">
    <div class="qnum" id="qnum-label">1 / 60</div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div class="score-live" id="score-live">✓ 0</div>
    <button class="exit-btn" onclick="goHome()">나가기</button>
  </div>
  <div class="quiz-body">
    <div class="q-meta">
      <span class="q-badge" id="q-badge">객관식</span>
      <span class="q-num-badge" id="q-num-badge">Q1</span>
    </div>
    <div class="q-text" id="q-text"></div>
    <div id="q-extra"></div><!-- 코드블록 등 -->
    <div class="choices" id="choices"></div>
    <div class="input-area" id="input-area" style="display:none">
      <textarea id="user-input" placeholder="답을 입력하세요..." rows="3"></textarea>
      <div class="input-hint">* 단답형: 핵심 키워드 위주로 입력. 채점 후 정답과 비교하세요.</div>
    </div>
    <div class="feedback-box" id="feedback"></div>
    <div class="btn-row">
      <button class="btn-check" id="btn-check" onclick="checkAnswer()">확인</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()" style="display:none">다음 문제 →</button>
      <button class="btn-skip" onclick="skipQ()">건너뛰기</button>
    </div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="result-screen" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">퀴즈 완료!</div>
  <div class="result-score-big" id="result-score">0<span>/0</span></div>
  <div class="result-sub" id="result-sub"></div>
  <div class="result-grid">
    <div class="result-stat"><div class="rs-val g" id="r-correct">0</div><div class="rs-label">✅ 정답</div></div>
    <div class="result-stat"><div class="rs-val r" id="r-wrong">0</div><div class="rs-label">❌ 오답</div></div>
    <div class="result-stat"><div class="rs-val y" id="r-skip">0</div><div class="rs-label">⏭ 건너뜀</div></div>
  </div>
  <div class="category-result" id="cat-result"></div>
  <div class="result-btns">
    <button class="btn-retry" onclick="retryAll()">🔄 다시 풀기</button>
    <button class="btn-wrong-only" onclick="retryWrong()">❌ 틀린 문제만</button>
    <button class="btn-home" onclick="goHome()">🏠 처음으로</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  문제 데이터 (60문제)
// ═══════════════════════════════════════════
const ALL_Q = [

// ── 객관식 ──
{id:1, type:'obj', cat:'SVM',
 q:'다음 중 SVM이 특성 스케일에 민감한 이유와 해결책이 올바르게 짝지어진 것은?',
 choices:['스케일이 다르면 결정 경계가 치우쳐짐 → StandardScaler 적용','스케일이 다르면 학습률이 자동 조정됨 → 별도 처리 불필요','스케일이 다르면 커널 트릭이 작동 안 함 → MinMaxScaler 적용','스케일은 SVM 성능에 영향 없음 → 스케일 조정 불필요'],
 ans:0,
 exp:'SVM은 마진을 최대화하는 과정에서 특성 크기 차이에 민감하다. 스케일 불균형 시 결정 경계가 치우쳐지므로 StandardScaler 적용 필수. 실습에서도 스케일 미적용 시 LinearSVC가 수렴 실패하는 것을 확인했다.'},

{id:2, type:'obj', cat:'SVM',
 q:'소프트 마진 SVM에서 하이퍼파라미터 C에 대한 설명으로 옳지 않은 것은?',
 choices:['C가 크면 마진 오류를 적게 허용한다','C가 작으면 도로 폭이 넓어진다','모델이 과대적합이면 C를 증가시켜 규제한다','C가 너무 작으면 과소적합이 될 수 있다'],
 ans:2,
 exp:'과대적합 시에는 C를 감소시켜야 한다. C를 줄이면 오차를 허용해서 도로가 넓어지고, 모델이 개별 샘플에 지나치게 맞추는 것을 방지한다. C 증가 시 오히려 과대적합이 심해진다.'},

{id:3, type:'obj', cat:'모델튜닝',
 q:'GridSearchCV vs RandomizedSearchCV에 대한 설명으로 옳은 것은?',
 choices:['GridSearchCV는 연속형 하이퍼파라미터 탐색에 더 유리하다','RandomizedSearchCV는 탐색 횟수를 n_iter로 고정할 수 있다','GridSearchCV는 RandomizedSearchCV보다 항상 더 좋은 성능을 보장한다','RandomizedSearchCV는 모든 하이퍼파라미터 조합을 탐색한다'],
 ans:1,
 exp:'RandomizedSearchCV의 핵심 장점: 탐색 횟수를 n_iter로 제어 가능, 연속형 파라미터도 확률분포에서 샘플링하여 더 많은 값 탐색 가능. GridSearchCV는 지정한 값의 모든 조합을 탐색하므로 탐색 공간이 크면 매우 느려진다.'},

{id:4, type:'obj', cat:'전처리',
 q:'OneHotEncoder와 pandas get_dummies()의 차이에 대한 설명으로 옳은 것은?',

{id:62, type:'sub', cat:'SVM',
 q:'SVM 이론에서 다음을 설명하시오.\n\n(1) 가중치 벡터 w와 마진 폭의 관계\n(2) 슬랙 변수 ζ⁽ⁱ⁾(zeta)의 의미\n(3) 소프트 마진 목적함수에서 C가 커지면 어떻게 되는가?',
 ans:'(1) 가중치 벡터 w가 작을수록 마진이 커진다 (기울기 반 줄면 마진 2배)\n(2) i번째 샘플이 얼마나 마진 오류를 발생시킬지 허용하는 변수 (ζ≥0)\n(3) C가 커지면 슬랙변수가 커질 수 없어 오차를 허용하지 않음 → 과대적합 위험',
 exp:'목적함수: minimize (1/2)wᵀw + C×Σζ⁽ⁱ⁾\nC 작음: 슬랙변수 허용 → 마진 넓고 일반화 좋음\nC 큼: 슬랙변수 억제 → 마진 좁고 샘플 하나하나에 맞춤 → 과대적합'},

{id:63, type:'sub', cat:'SVM',

 ans:'gamma 클수록: 종 모양이 좁아짐 → 각 샘플의 영향 범위가 국소적 → 경계가 복잡하고 구불구불함 → 과대적합 위험\ngamma 작을수록: 종 모양이 넓게 퍼짐 → 각 샘플의 영향 범위가 넓음 → 경계가 단순하고 완만함 → 과소적합 위험',
 exp:'교수님 강조: gamma가 클수록 훈련 데이터 하나하나에 타이트하게 맞는 복잡한 경계가 생김. C와 비슷한 효과지만 역할이 다름 — C는 훈련 오차, gamma는 모델 복잡도.'},

{id:67, type:'sub', cat:'분류',
 q:'다음을 설명하시오.\n\n(1) DummyClassifier를 사용하는 이유\n(2) MNIST 5-감지기에서 DummyClassifier의 정확도가 약 90%인 이유\n(3) 이를 통해 알 수 있는 정확도(accuracy)의 한계',

{id:73, type:'obj', cat:'경사하강법',

{id:74, type:'sub', cat:'경사하강법',
 q:'다음 세 가지 경사 하강법을 비교하여 각각의 특징을 쓰시오.\n\n(1) 배치 경사 하강법\n(2) 확률적 경사 하강법(SGD)\n(3) 미니 배치 경사 하강법',

{id:75, type:'code', cat:'선형회귀',
 q:'다음은 타깃 스케일링에 관한 코드이다. 빈칸을 채우시오.\n\n# 방법 1: 직접 스케일\ntarget_scaler = StandardScaler()\nscaled_labels = target_scaler.fit_transform(housing_labels.to_frame())\nmodel.fit(housing[["median_income"]], scaled_labels)\npredictions = target_scaler.①(model.predict(some_new_data))\n\n# 방법 2: 더 편리한 방법\nfrom sklearn.compose import ②\nmodel = ②(LinearRegression(), transformer=StandardScaler())',

{id:77, type:'sub', cat:'분류',
 q:'다음 빈칸을 채우시오.\n\n다중 레이블 분류에서 ClassifierChain을 사용하는 이유:\n레이블당 하나의 모델을 학습하면 (①) 포착이 어렵기 때문.\nClassifierChain은 앞 모델의 (②)을 다음 모델의 입력으로 사용하며,\n훈련 시에는 진짜 (③)를 사용한다.',

{id:78, type:'code', cat:'분류',

{id:82, type:'sub', cat:'분류',

{id:89, type:'obj', cat:'선형회귀',
 q:'MSE(평균 제곱 오차)와 RMSE(평균 제곱근 오차)의 관계에 대한 설명으로 옳은 것은?',
 choices:['MSE를 최소화하는 것과 RMSE를 최소화하는 것은 다른 결과를 낳는다','RMSE = √MSE이며, MSE를 최소화하면 RMSE도 최소화된다','RMSE는 회귀에서 사용하고 MSE는 분류에서 사용한다','MSE가 항상 RMSE보다 크다'],
 ans:1,

{id:90, type:'sub', cat:'경사하강법',
 q:'MSE 비용 함수가 볼록 함수(convex function)인 것이 경사 하강법에 왜 유리한지 설명하시오.',

{id:91, type:'obj', cat:'전처리',

 ans:1,

{id:93, type:'sub', cat:'전처리',

// ═══════════════════════════════════
//  상태

// ═══════════════════════════════════
//  상태
// ═══════════════════════════════════
let mode = 'all';
let questions = [];
let cur = 0;
let score = 0;
let skipped = 0;
let wrongList = [];
let answered = false;
let totalQ = 0;

function selectMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function startQuiz() {
  let pool = [...ALL_Q];
  if (mode === 'obj') pool = ALL_Q.filter(q => q.type === 'obj');
  else if (mode === 'sub') pool = ALL_Q.filter(q => q.type === 'sub');
  else if (mode === 'code') pool = ALL_Q.filter(q => q.type === 'code');
  else if (mode === 'random20') {
    pool = [...ALL_Q].sort(() => Math.random() - 0.5).slice(0, 20);
  }
  questions = pool.sort(() => Math.random() - 0.5);
  cur = 0; score = 0; skipped = 0; wrongList = [];
  totalQ = questions.length;
  showScreen('quiz-screen');
  renderQ();
}

function retryAll() {
  questions = [...questions].sort(() => Math.random() - 0.5);
  cur = 0; score = 0; skipped = 0; wrongList = [];
  showScreen('quiz-screen');
  renderQ();
}

function retryWrong() {
  if (wrongList.length === 0) { alert('틀린 문제가 없습니다! 🎉'); return; }
  questions = wrongList.sort(() => Math.random() - 0.5);
  totalQ = questions.length;
  cur = 0; score = 0; skipped = 0; wrongList = [];
  showScreen('quiz-screen');
  renderQ();
}

function goHome() {
  showScreen('start-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════
//  문제 렌더링
// ═══════════════════════════════════
function renderQ() {
  if (cur >= questions.length) { showResult(); return; }
  const q = questions[cur];
  answered = false;

  // 상단바
  document.getElementById('qnum-label').textContent = `${cur+1} / ${totalQ}`;
  document.getElementById('prog').style.width = `${(cur/totalQ)*100}%`;
  document.getElementById('score-live').textContent = `✓ ${score}`;

  // 배지
  const badge = document.getElementById('q-badge');
  badge.textContent = q.type === 'obj' ? '객관식' : q.type === 'sub' ? '단답형' : '코드 문제';
  badge.className = 'q-badge ' + q.type;
  document.getElementById('q-num-badge').textContent = `Q${q.id}`;

  // 문제 텍스트
  document.getElementById('q-text').innerHTML = fmtText(q.q);

  // 코드 블록 (q.code 있으면)
  const extra = document.getElementById('q-extra');
  extra.innerHTML = q.code ? `<div class="code-block">${q.code}</div>` : '';

  // 피드백 초기화
  const fb = document.getElementById('feedback');
  fb.className = 'feedback-box';
  fb.innerHTML = '';

  // 버튼 리셋
  document.getElementById('btn-check').style.display = 'inline-block';
  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-next').style.display = 'none';

  // 객관식 vs 단답형/코드
  const choicesEl = document.getElementById('choices');
  const inputArea = document.getElementById('input-area');

  if (q.type === 'obj') {
    choicesEl.style.display = 'flex';
    inputArea.style.display = 'none';
    choicesEl.innerHTML = q.choices.map((c, i) =>
      `<button class="choice-btn" onclick="selectChoice(this, ${i})">
        <span class="ch-label">${['①','②','③','④'][i]}</span>
        <span>${fmtText(c)}</span>
      </button>`
    ).join('');
  } else {
    choicesEl.style.display = 'none';
    inputArea.style.display = 'block';
    const ta = document.getElementById('user-input');
    ta.value = '';
    ta.disabled = false;
    ta.rows = q.type === 'code' ? 3 : 4;
    ta.oninput = () => { document.getElementById('btn-check').disabled = ta.value.trim() === ''; };
    document.getElementById('btn-check').disabled = false; // 단답형은 항상 확인 가능
  }
}

function fmtText(t) {
  if (!t) return '';
  return t
    .replace(/\n/g, '<br>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

let selectedChoice = -1;

function selectChoice(el, idx) {
  document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedChoice = idx;
  document.getElementById('btn-check').disabled = false;
}

function checkAnswer() {
  if (answered) return;
  answered = true;
  const q = questions[cur];
  const fb = document.getElementById('feedback');

  if (q.type === 'obj') {
    const correct = q.ans;
    const buttons = document.querySelectorAll('.choice-btn');
    buttons.forEach((b, i) => {
      b.disabled = true;
      if (i === correct) b.classList.add('correct');
      else if (i === selectedChoice) b.classList.add('wrong');
      else b.classList.add('dimmed');
    });
    const isCorrect = selectedChoice === correct;
    if (isCorrect) { score++; }
    else { wrongList.push(q); }

    fb.className = `feedback-box show ${isCorrect ? 'correct' : 'wrong'}`;
    fb.innerHTML = `
      <div class="feedback-title">${isCorrect ? '✅ 정답!' : '❌ 오답'}</div>
      <div class="feedback-ans">${isCorrect ? '잘 했어요!' : `<strong>정답: ${['①','②','③','④'][correct]}</strong> ${fmtText(q.choices[correct])}`}</div>
      <div class="feedback-exp">${fmtText(q.exp)}</div>`;
  } else {
    wrongList.push(q);
    fb.className = 'feedback-box show info';
    fb.innerHTML = `
      <div class="feedback-title">📋 정답 확인</div>
      <div class="feedback-ans"><strong>모범 답안:</strong><br>${fmtText(q.ans)}</div>
      <div class="feedback-exp">${fmtText(q.exp)}</div>`;
    document.getElementById('user-input').disabled = true;
  }

  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('score-live').textContent = `✓ ${score}`;
  selectedChoice = -1;
}

function nextQ() {
  cur++;
  renderQ();
}

function skipQ() {
  skipped++;
  wrongList.push(questions[cur]);
  cur++;
  renderQ();
}

// ═══════════════════════════════════
//  결과
// ═══════════════════════════════════
function showResult() {
  showScreen('result-screen');
  const pct = Math.round((score / totalQ) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '💪' : '📚';
  const title = pct >= 90 ? '완벽해요!' : pct >= 70 ? '잘 했어요!' : pct >= 50 ? '조금 더 공부해요!' : '다시 한번!';

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').innerHTML = `${score}<span>/${totalQ}</span>`;
  document.getElementById('result-sub').textContent = `정답률 ${pct}% · 건너뜀 ${skipped}문제`;
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = totalQ - score - skipped;
  document.getElementById('r-skip').textContent = skipped;

  // 범주별 결과
  const cats = {};
  questions.forEach(q => {
    if (!cats[q.cat]) cats[q.cat] = {total:0, correct:0};
    cats[q.cat].total++;
  });
  wrongList.forEach(q => {
    if (cats[q.cat]) cats[q.cat].correct--;
  });
  questions.forEach(q => { if (cats[q.cat]) cats[q.cat].correct = Math.max(0, cats[q.cat].correct); });

  // 재계산: 카테고리별 정답 수
  const catScore = {};
  questions.forEach(q => { if (!catScore[q.cat]) catScore[q.cat] = {total:0, c:0}; catScore[q.cat].total++; });
  const wrongIds = new Set(wrongList.map(q => q.id));
  questions.forEach(q => { if (!wrongIds.has(q.id)) catScore[q.cat].c++; });

  const catHtml = Object.entries(catScore).map(([cat, v]) => {
    const p = Math.round((v.c / v.total) * 100);
    const color = p >= 80 ? '#3fb950' : p >= 50 ? '#d29922' : '#f85149';
    return `<div class="cat-row">
      <div class="cat-label">${cat}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${p}%;background:${color}"></div></div>
      <div class="cat-pct" style="color:${color}">${p}%</div>
    </div>`;
  }).join('');
  document.getElementById('cat-result').innerHTML = catHtml;
}
</script>
